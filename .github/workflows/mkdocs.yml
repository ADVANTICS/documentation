name: Build docs

on:
  push:
    branches:
      - material
    paths:
      - "products/**"
      - "tools/**"
      - ".github/workflows/mkdocs.yml"

jobs:
  # ── Generate ADB CAN databases ─────────────────────────────────────────────
  # Runs once (not per-product) because all ADB products share the same
  # CAN_Databases submodule checkout. Uploads generated KCDs/DBCs/MDs as an
  # artifact consumed by the build jobs below.
  generate-adb-can:
    if: github.ref == 'refs/heads/material'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false   # CAN_Databases handled separately below

      - name: Checkout CAN_Databases submodule (all branches accessible)
        uses: actions/checkout@v5
        with:
          repository: ADVANTICS/CAN_Databases
          ssh-key: ${{ secrets.CAN_DATABASES_DEPLOY_KEY }}
          path: CAN_Databases
          # no ref — leaves repo in detached HEAD at default branch;
          # generate_adb_can.py fetches individual branches on demand

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Generate all ADB CAN databases
        run: |
          source .venv/bin/activate
          python tools/generate_adb_can.py \
            --all \
            --can-databases-path CAN_Databases

      - name: Upload generated CAN artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adb-can-artifacts
          # Glob picks up all versioned KCDs/DBCs and the generated MDs.
          # To add a new ADB product: add it to tools/adb_docs_manifest.json.
          path: |
            products/adb-pc-*/docs/assets/ADB_PC_*.kcd
            products/adb-pc-*/docs/assets/ADB_PC_*.dbc
            products/adb-pc-*/docs/can_bus_interface.md
          retention-days: 1

  # ── Build and upload docs ──────────────────────────────────────────────────
  build-and-upload:
    if: github.ref == 'refs/heads/material'
    runs-on: ubuntu-latest
    needs: generate-adb-can

    strategy:
      matrix:
        product:
          - adb-pc-ac01
          - adb-pc-dc01
          - adm-cs-spcc
          - adm-pc-bi25

    steps:
      - uses: actions/checkout@v5

      - name: Download generated CAN artifacts (ADB products only)
        # adm-cs-spcc and adm-pc-bi25 don't need ADB CAN generation
        if: startsWith(matrix.product, 'adb-pc-')
        uses: actions/download-artifact@v4
        with:
          name: adb-can-artifacts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Build docs
        run: |
          source .venv/bin/activate
          cd products/${{ matrix.product }}
          PDF_EXPORT=1 mkdocs build --clean

      - name: Upload to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_DOCS_USERNAME }}
          password: ${{ secrets.FTP_DOCS_PASSWORD }}
          protocol: ftps
          local-dir: products/${{ matrix.product }}/site/
          server-dir: public_html/${{ matrix.product }}/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/pdf/*.pdf
      - name: Find and list PDF files
        run: |
          echo "Found the following PDF files:"
          find products -type f -path "*/pdf/*.pdf" -print

      # - name: Upload PDFs as artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: product-pdfs
      #     path: |
      #       products/**/pdf/*.pdf
