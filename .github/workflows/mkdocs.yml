name: Build docs

on:
  push:
    branches:
      - material
    paths:
      - "products/**"
      - "tools/**"
      - ".github/workflows/mkdocs.yml"
  workflow_dispatch:
    inputs:
      product:
        description: "Product to build (leave empty to build all)"
        required: false
        type: choice
        options:
          - ""
          - adb-pc-ac01
          - adb-pc-dc01
          - adm-cs-spcc
          - adm-pc-bi25

jobs:
  # ── Detect which products changed ──────────────────────────────────────────
  # Builds a dynamic matrix so build-and-upload only runs for products whose
  # files changed. Changes to tools/** or this workflow file are treated as
  # affecting every product, since they're shared build dependencies.
  detect-changes:
    if: github.ref == 'refs/heads/material' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      products: ${{ steps.set-matrix.outputs.products }}

    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            workflow:
              - '.github/workflows/mkdocs.yml'
            adb-pc-ac01:
              - 'products/adb-pc-ac01/**'
              - 'tools/**'
            adb-pc-dc01:
              - 'products/adb-pc-dc01/**'
              - 'tools/**'
            adm-cs-spcc:
              - 'products/adm-cs-spcc/**'
            adm-pc-bi25:
              - 'products/adm-pc-bi25/**'

      - name: Compute product matrix
        id: set-matrix
        env:
          DISPATCH_PRODUCT: ${{ github.event.inputs.product }}
          WORKFLOW_CHANGED: ${{ steps.filter.outputs.workflow }}
          AC01_CHANGED: ${{ steps.filter.outputs['adb-pc-ac01'] }}
          DC01_CHANGED: ${{ steps.filter.outputs['adb-pc-dc01'] }}
          SPCC_CHANGED: ${{ steps.filter.outputs['adm-cs-spcc'] }}
          BI25_CHANGED: ${{ steps.filter.outputs['adm-pc-bi25'] }}
        run: |
          if [[ -n "$DISPATCH_PRODUCT" ]]; then
            products=("$DISPATCH_PRODUCT")
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" || "$WORKFLOW_CHANGED" == "true" ]]; then
            products=(adb-pc-ac01 adb-pc-dc01 adm-cs-spcc adm-pc-bi25)
          else
            products=()
            [[ "$AC01_CHANGED" == "true" ]] && products+=(adb-pc-ac01)
            [[ "$DC01_CHANGED" == "true" ]] && products+=(adb-pc-dc01)
            [[ "$SPCC_CHANGED" == "true" ]] && products+=(adm-cs-spcc)
            [[ "$BI25_CHANGED" == "true" ]] && products+=(adm-pc-bi25)
          fi
          json=$(printf '%s\n' "${products[@]}" | jq -R . | jq -sc .)
          echo "products=$json" >> "$GITHUB_OUTPUT"
          echo "Products to build: $json"

  # ── Generate ADB CAN databases ─────────────────────────────────────────────
  # Runs once (not per-product) because all ADB products share the same
  # CAN_Databases submodule checkout. Uploads generated KCDs/DBCs/MDs as an
  # artifact consumed by the build jobs below.
  generate-adb-can:
    if: github.ref == 'refs/heads/material' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false   # CAN_Databases handled separately below

      - name: Checkout CAN_Databases submodule (all branches accessible)
        uses: actions/checkout@v5
        with:
          repository: ADVANTICS/CAN_Databases
          ssh-key: ${{ secrets.CAN_DATABASES_DEPLOY_KEY }}
          path: CAN_Databases
          # no ref — leaves repo in detached HEAD at default branch;
          # generate_adb_can.py fetches individual branches on demand

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Generate all ADB CAN databases
        run: |
          source .venv/bin/activate
          python tools/generate_adb_can.py \
            --all \
            --can-databases-path CAN_Databases

      - name: Upload generated CAN artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adb-can-artifacts
          # Glob picks up all versioned KCDs/DBCs and the generated MDs.
          # To add a new ADB product: add it to tools/adb_docs_manifest.json.
          path: |
            products/adb-pc-*/docs/assets/ADB_PC_*.kcd
            products/adb-pc-*/docs/assets/ADB_PC_*.dbc
            products/adb-pc-*/docs/can_bus_interface.md
          retention-days: 1

  # ── Build and upload docs ──────────────────────────────────────────────────
  build-and-upload:
    if: (github.ref == 'refs/heads/material' || github.event_name == 'workflow_dispatch') && needs.detect-changes.outputs.products != '[]'
    runs-on: ubuntu-latest
    needs: [detect-changes, generate-adb-can]

    strategy:
      matrix:
        product: ${{ fromJson(needs.detect-changes.outputs.products) }}

    steps:
      - uses: actions/checkout@v5

      - name: Download generated CAN artifacts (ADB products only)
        # adm-cs-spcc and adm-pc-bi25 don't need ADB CAN generation
        if: startsWith(matrix.product, 'adb-pc-')
        uses: actions/download-artifact@v4
        with:
          name: adb-can-artifacts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Build docs
        run: |
          source .venv/bin/activate
          cd products/${{ matrix.product }}
          PDF_EXPORT=1 mkdocs build --clean

      - name: Upload to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_DOCS_USERNAME }}
          password: ${{ secrets.FTP_DOCS_PASSWORD }}
          protocol: ftps
          local-dir: products/${{ matrix.product }}/site/
          # Manual runs (workflow_dispatch) deploy under public_html/staging/
          # instead of the live product path, so testing never overwrites prod.
          server-dir: ${{ github.event_name == 'workflow_dispatch' && format('public_html/staging/{0}/', matrix.product) || format('public_html/{0}/', matrix.product) }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/pdf/*.pdf
      - name: Find and list PDF files
        run: |
          echo "Found the following PDF files:"
          find products -type f -path "*/pdf/*.pdf" -print

      # - name: Upload PDFs as artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: product-pdfs
      #     path: |
      #       products/**/pdf/*.pdf
